# pull-assist Proxy-Only Stack
# Use this when vLLM is ALREADY running (your current setup).
#
# ── Pipeline (why main.py can "work" but pa review fails) ───────────────────
#   main.py + .env     → often LLM_BASE_URL = http://GPU:8000/v1  (vLLM direct;
#                        LangChain speaks HTTP to vLLM and handles streaming.)
#   pa review + gist   → LLM_BASE_URL = http://GPU:9000/v1  (this proxy; must
#                        return one JSON body, not SSE, unless proxy ≥0.2.0.)
#
# After git pull on the GPU host, rebuild the proxy image so server/proxy.py
# updates are inside the container:
#   docker compose build --no-cache proxy && docker compose up -d
# Verify new code:  curl -s http://localhost:9000/version | grep proxy_version
# (expect proxy_version 0.2.0 or newer with SSE coalescing.)
#
# Start vLLM first (pick ONE style):
#
# A) Default — plain vLLM (no tool-choice flags). The app uses legacy tools by default.
#   python -m vllm.entrypoints.openai.api_server \
#     --model deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct \
#     --host 0.0.0.0 --port 8000 \
#     --dtype float16 --max-model-len 16384 \
#     --gpu-memory-utilization 0.85 --trust-remote-code
#
# B) Native OpenAI tools (requires vLLM with --enable-auto-tool-choice and parser):
#   export USE_NATIVE_TOOL_CALLING=true
#   python -m vllm.entrypoints.openai.api_server \
#     --model deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct \
#     --host 0.0.0.0 --port 8000 \
#     --dtype float16 --max-model-len 16384 \
#     --gpu-memory-utilization 0.85 \
#     --enable-auto-tool-choice --tool-call-parser hermes \
#     --trust-remote-code
#
# Use --max-model-len well above (prompt + LLM_MAX_TOKENS + scratchpad). 4096 is too small.
#
# Then deploy the proxy:
#   docker compose up -d
#
# Architecture:
#   vLLM (:8000) ← FastAPI Proxy (:9000) ← Your Mac (pa review)
#
# The proxy connects to vLLM on the HOST network via host.docker.internal
# or the host IP. No port conflicts since we don't touch port 8000.

version: "3.9"

services:
  # ── FastAPI Proxy — Auth + rate limiting layer ────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: pull-assist-proxy
    restart: unless-stopped
    # Use host network so the proxy can reach vLLM on localhost:8000
    network_mode: host
    environment:
      # Points to your already-running vLLM on port 8000
      - VLLM_BACKEND_URL=http://localhost:8000
      - PROXY_PORT=9000
      - RATE_LIMIT_PER_MINUTE=30
      - MAX_CONCURRENT_PER_KEY=2
      - ADMIN_SECRET=${ADMIN_SECRET:-changeme}
      - API_KEYS_FILE=/data/api_keys.json
      - USAGE_LOG_FILE=/data/usage.log
    volumes:
      - proxy-data:/data

volumes:
  proxy-data:
