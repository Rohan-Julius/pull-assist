# pull-assist Backend Stack
# Deploy: docker compose up -d
#
# Architecture:
#   Nginx (:443/:80) → FastAPI Proxy (:9000) → vLLM (:8000)
#
# For AMD GPUs, ensure ROCm drivers are installed on the host.
# See: https://rocm.docs.amd.com/projects/install-on-linux/en/latest/

version: "3.9"

services:
  # ── vLLM — Model inference server ─────────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:latest
    container_name: pull-assist-vllm
    restart: unless-stopped
    # For AMD GPU (ROCm), use:
    #   image: rocm/vllm:latest
    #   devices:
    #     - /dev/kfd
    #     - /dev/dri
    # For NVIDIA GPU, use:
    #   deploy:
    #     resources:
    #       reservations:
    #         devices:
    #           - driver: nvidia
    #             count: 1
    #             capabilities: [gpu]
    ports:
      - "8000:8000"
    volumes:
      - vllm-cache:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
    # Omit --enable-auto-tool-choice if your vLLM image fails engine init; then set
    # USE_NATIVE_TOOL_CALLING=false when running the pull-assist CLI.
    command: >
      --model deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct
      --host 0.0.0.0
      --port 8000
      --dtype float16
      --max-model-len 16384
      --gpu-memory-utilization 0.85
      --trust-remote-code
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── FastAPI Proxy — Auth + rate limiting layer ────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: pull-assist-proxy
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - VLLM_BACKEND_URL=http://vllm:8000
      - PROXY_PORT=9000
      - RATE_LIMIT_PER_MINUTE=30
      - MAX_CONCURRENT_PER_KEY=2
      - ADMIN_SECRET=${ADMIN_SECRET:-changeme}
      - API_KEYS_FILE=/data/api_keys.json
      - USAGE_LOG_FILE=/data/usage.log
    volumes:
      - proxy-data:/data
    depends_on:
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Nginx — TLS termination + reverse proxy ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pull-assist-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for TLS:
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - proxy

volumes:
  vllm-cache:
  proxy-data:
